<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Exemplo De TypeScript</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/cadastro.js" type="module" defer></script>

</head>

<body>
    <main id="geral">
        <h1>Cadastro de Alunos</h1>

        <header id="cabecalho">

            <div id="logo">
                <h1>Sistema Escolar</h1>
            </div>

        </header>

        <section id="form">

            <form id="cadastro-aluno">

                <label for="nome">Nome Completo</label>
                <input type="text" name="nome" id="nome" required maxlength="30" placeholder="Nome completo">

                <label for="matricula">Matricula</label>
                <input type="number" name="matricula" id="matricula" required placeholder="Número da matricula">

                <label for="turma">Serie/Turma</label>
                <select name="turma" id="turma" required>
                    <option value="1A">1°A</option>
                    <option value="1B">1°B</option>
                    <option value="1C">1°C</option>
                    <option value="2A">2°A</option>
                    <option value="2B">2°B</option>
                    <option value="2C">2°C</option>
                    <option value="3A">3°A</option>
                    <option value="3B">3°B</option>
                    <option value="3C">3°C</option>
                </select>

                <label for="turno">Turno</label>
                <select name="turno" id="turno" required>
                    <option value="manha">Manhã</option>
                    <option value="tarde">Tarde</option>
                    <option value="integral">Integral</option>
                </select>

                <button type="submit">Enviar cadastro</button>
                <button type="reset">Limpar formulário</button>
            </form>

            <nav id="menu">
                <ul>
                    <li><a href="paginas/alunos.html" class="links">Alunos Cadastrados</a></li>
                </ul>
            </nav>


        </section>

    </main>
</body>

</html>
